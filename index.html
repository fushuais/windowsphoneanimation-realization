<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WP 音乐枢纽完整展示</title>
    <style>
        :root {
            --accent-red: #a40033;
            --accent-blue: #0078d7;
            --bg-black: #000000;
            --pivot: -150px center;
        }

        body {
            background-color: var(--bg-black);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: "Segoe UI Light", "Segoe UI", sans-serif;
            perspective: 1500px;
        }

        .phone-container {
            width: 380px;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        /* --- 桌面网格布局 --- */
        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 85px;
            gap: 10px;
            padding: 40px 10px;
            transform-origin: var(--pivot);
            transition: transform 0.7s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.5s;
        }

        .tile {
            background-color: var(--accent-red);
            color: white;
            position: relative;
            cursor: pointer;
            transform-origin: var(--pivot);
            transition: transform 0.7s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.6s;
        }

        .tile:active { transform: scale(0.96); }
        .tile-1x1 { grid-column: span 1; grid-row: span 1; }
        .tile-2x2 { grid-column: span 2; grid-row: span 2; }
        .tile-4x2 { grid-column: span 4; grid-row: span 2; }

        /* 旋转门退出状态 (向左后方旋开) */
        .turnstile-out {
            transform: rotateY(90deg) translateZ(-600px) !important;
            opacity: 0 !important;
        }

        /* --- 音乐枢纽页面 (Music Hub) --- */
        .music-hub {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            color: white;
            z-index: 100;
            opacity: 0;
            transform-origin: var(--pivot);
            /* 初始状态：从右侧旋入 */
            transform: rotateY(-70deg) translateZ(500px);
            transition: transform 0.7s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.4s;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            box-sizing: border-box;
        }

        .music-hub.visible {
            opacity: 1;
            transform: rotateY(0deg) translateZ(0);
            pointer-events: auto;
        }

        .hub-header { margin-bottom: 20px; }
        .hub-title { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
        .hub-main-name { font-size: 64px; font-weight: 100; margin: -5px 0 0 -3px; }

        /* 全景导航效果 */
        .panorama-nav {
            display: flex;
            gap: 25px;
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 30px;
        }
        .nav-active { color: white; }
        .nav-inactive { color: #444; }

        .music-list { list-style: none; padding: 0; margin: 0; }
        .music-item {
            font-size: 28px;
            font-weight: 200;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s ease-out;
        }
        .visible .music-item { opacity: 1; transform: translateX(0); }

        .back-area { margin-top: auto; padding: 20px 0; color: var(--accent-red); cursor: pointer; font-size: 18px; }

        /* 辅助样式 */
        .label { position: absolute; bottom: 8px; left: 8px; font-size: 13px; }
        .music-icons { display: grid; grid-template-columns: repeat(3, 1fr); padding: 15px; gap: 8px; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="tiles-grid" id="mainGrid">
        <div class="tile tile-1x1" style="transition-delay: 0ms;">📞</div>
        <div class="tile tile-1x1" style="transition-delay: 20ms;">💬</div>
        <div class="tile tile-1x1" style="transition-delay: 40ms;">📧</div>
        <div class="tile tile-1x1" style="transition-delay: 60ms;">🌐</div>

        <div class="tile tile-2x2" style="transition-delay: 80ms; background: #555;">
            <div class="label">照片</div>
        </div>

        <div class="tile tile-2x2" id="musicTile" onclick="openMusicHub()" style="transition-delay: 100ms;">
            <div class="music-icons">
                <span>🎧</span><span>▶️</span><span>🎙️</span>
                <span>📻</span><span>📁</span><span>🎵</span>
            </div>
            <div class="label">音乐+视频</div>
        </div>

        <div class="tile tile-4x2" style="transition-delay: 120ms; background: #33a600;">
            <div style="padding: 15px; font-size: 32px;">星期一 19</div>
            <div class="label">日历</div>
        </div>

        <div class="tile tile-2x2" style="transition-delay: 140ms; background: var(--accent-blue);">
            <div class="label">联系人</div>
        </div>
        <div class="tile tile-1x1" style="transition-delay: 160ms;">⚙️</div>
        <div class="tile tile-1x1" style="transition-delay: 180ms;">🧮</div>
    </div>

    <div class="music-hub" id="musicHub">
        <div class="hub-header">
            <div class="hub-title">音乐+视频</div>
            <div class="hub-main-name">音乐</div>
        </div>
        
        <div class="panorama-nav">
            <span class="nav-active">艺术家</span>
            <span class="nav-inactive">专辑</span>
            <span class="nav-inactive">歌曲</span>
        </div>

        <ul class="music-list">
            <li class="music-item" style="transition-delay: 0.4s;">周杰伦</li>
            <li class="music-item" style="transition-delay: 0.5s;">Taylor Swift</li>
            <li class="music-item" style="transition-delay: 0.6s;">Linkin Park</li>
            <li class="music-item" style="transition-delay: 0.7s;">加州旅馆</li>
        </ul>

        <div class="back-area" onclick="closeMusicHub()">← 桌面</div>
    </div>
</div>

<script>
    function openMusicHub() {
        const gridItems = document.querySelectorAll('.tile');
        const hub = document.getElementById('musicHub');
        
        // 1. 桌面磁贴依次旋转退出
        gridItems.forEach(tile => {
            tile.classList.add('turnstile-out');
        });

        // 2. 音乐页面切入
        setTimeout(() => {
            hub.classList.add('visible');
        }, 200);
    }

    function closeMusicHub() {
        const gridItems = document.querySelectorAll('.tile');
        const hub = document.getElementById('musicHub');
        
        // 1. 音乐页面退出
        hub.classList.remove('visible');
        
        // 2. 桌面磁贴旋回
        setTimeout(() => {
            gridItems.forEach(tile => {
                tile.classList.remove('turnstile-out');
            });
        }, 300);
    }
</script>

</body>
</html>
